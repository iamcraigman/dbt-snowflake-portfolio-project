version: 2

sources:
  - name: subscription_platform
    database: dbt-bigquery-portfolio-project
    schema: project_data # Update this if your BigQuery dataset name is different
    description: "Raw data ingested from the subscription SaaS platform transactional databases."
    tables:
      - name: raw_customers
        description: "Raw customer profile and acquisition data."
        tests:
          - unique:
              column_name: customer_id
          - not_null:
              column_name: customer_id

      - name: raw_subscriptions
        description: "Raw transactional log tracking historical and active subscription statuses."
        tests:
          - unique:
              column_name: subscription_id
          - not_null:
              column_name: subscription_id

      - name: raw_usage_logs
        description: "Raw application clickstream events tracking user behavior."
        tests:
          - unique:
              column_name: event_id
          - not_null:
              column_name: event_id