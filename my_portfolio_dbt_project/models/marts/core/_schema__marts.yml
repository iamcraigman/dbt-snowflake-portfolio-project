- name: dim_customers
    description: "The primary customer dimension table. Combines cleaned profile details with their latest active subscription status and MRR."
    columns:
      - name: customer_id
        data_type: string
        description: "Primary key. Unique identifier for each customer."
        tests:
          - unique
          - not_null

      - name: customer_email
        data_type: string
        description: "The customer's email address."

      - name: is_valid_email_format
        data_type: bool
        description: "Flag indicating whether the email format passed semantic validation."

      - name: country_code
        data_type: string
        description: "Two-letter ISO country code."

      - name: acquisition_channel_id
        data_type: string
        description: "Foreign key referencing the marketing channel seed."
        tests:
          - relationships:
              to: ref('raw_marketing_channels')
              field: channel_id

      - name: signed_up_at
        data_type: timestamp
        description: "Timestamp when the customer profile was created."

      - name: current_plan_id
        data_type: string
        description: "Foreign key referencing the customer's current active plan. Defaults to 'unsubscribed' if none."
        tests:
          - relationships:
              to: ref('raw_plans')
              field: plan_id

      - name: current_status
        data_type: string
        description: "The customer's current subscription lifecycle status (e.g., active, inactive)."

      - name: current_mrr
        data_type: numeric
        description: "The exact MRR amount generated by the customer's current plan."

  - name: fct_subscriptions_historical
    description: "An incremental fact table tracking the historical lifecycle and date boundaries of all subscription records."
    columns:
      - name: subscription_id
        data_type: string
        description: "Primary key. Unique identifier for the specific subscription record state."
        tests:
          - unique
          - not_null

      - name: customer_id
        data_type: string
        description: "Foreign key mapping back to the dim_customers table."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: subscription_plan
        data_type: string
        description: "The raw plan name assigned to the subscription."

      - name: mrr_amount
        data_type: numeric
        description: "The recorded Monthly Recurring Revenue amount for this history slice."

      - name: subscription_status
        data_type: string
        description: "The state of the subscription during this historical window."

      - name: valid_from_date
        data_type: date
        description: "The start date of this historical record slice."

      - name: valid_to_date
        data_type: date
        description: "The end date of this historical record slice. Coalesces to CURRENT_DATE() if currently ongoing."

      - name: is_currently_active
        data_type: bool
        description: "Boolean flag identifying if this row represents a currently active subscription state."