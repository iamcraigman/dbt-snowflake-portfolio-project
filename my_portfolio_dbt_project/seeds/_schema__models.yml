version: 2

seeds:
  - name: raw_customers
    description: "Core dimensional data capturing initial user registration records and acquisition channels."
    config:
      column_types:
        customer_id: string
        signup_at: timestamp
        email: string
        country: string
        marketing_channel: string

  - name: raw_subscriptions
    description: "Transactional log tracking SaaS membership lifecycle events, pricing tiers, and account changes."
    config:
      column_types:
        subscription_id: string
        customer_id: string
        plan_name: string
        monthly_amount: float64
        status: string
        start_date: date
        end_date: date

  - name: raw_usage_logs
    description: "High-volume clickstream audit events tracking feature utilization and product engagement metrics."
    config:
      column_types:
        event_id: string
        customer_id: string
        event_timestamp: timestamp
        action: string
        feature_used: string

  - name: raw_plans
    description: "Master catalog of subscription tier levels."
    config:
      column_types:
        plan_id: string
        plan_name: string
        tier_level: int64

  - name: raw_plan_pricing_history
    description: "SCD Type 2 lookup log tracking pricing shifts and date validity ranges for subscription plans."
    config:
      column_types:
        price_id: string
        plan_id: string
        monthly_amount: float64
        valid_from: date
        valid_to: date

  - name: raw_marketing_channels
    description: "Lookup dimension cataloging distinct user acquisition streams."
    config:
      column_types:
        channel_id: string
        channel_name: string
        channel_type: string